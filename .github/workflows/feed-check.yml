name: feed-check

# Validates feed.json against the schema so a malformed feed can never reach
# main (and thus every install). Runs on ALL pull requests into main — no path
# filter — so it is a stable "required status check" a branch ruleset can
# require. Also runs on push to main as a post-merge backstop.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager/package-lock.json
      - name: Install manager deps
        working-directory: manager
        run: npm ci
      - name: Validate feed.json
        working-directory: manager
        run: npm run check:feed
